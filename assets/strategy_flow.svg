<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 860" width="680" height="860">
  <title>KH 퀀트 전략 알고리즘 흐름도</title>
  <desc>매주 월요일 실행되는 적립식 매수 전략 흐름도</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="680" height="860" fill="#ffffff"/>

  <!-- ① 트리거 (gray pill) -->
  <rect x="240" y="20" width="200" height="40" rx="20" fill="#f1efea" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#444441">매주 월요일 실행</text>

  <!-- arrow -->
  <line x1="340" y1="60" x2="340" y2="88" stroke="#64748b" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ② 데이터 수집 (teal) -->
  <rect x="110" y="90" width="460" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="340" y="112" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#085041">데이터 수집</text>
  <text x="340" y="132" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0f6e56">종목 주가 (raw)  ·  QQQ  ·  USD/KRW  ·  발행주수</text>

  <line x1="340" y1="146" x2="340" y2="174" stroke="#64748b" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ③ 시장 국면 판단 (blue) -->
  <rect x="150" y="176" width="380" height="56" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
  <text x="340" y="198" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#0c447c">시장 국면 판단</text>
  <text x="340" y="218" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#185fa5">QQQ 현재가  vs  200일 이동평균(MA200)</text>

  <line x1="340" y1="232" x2="340" y2="258" stroke="#64748b" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ④ 분기 마름모 -->
  <polygon points="340,258 405,288 340,318 275,288" fill="#f8fafc" stroke="#64748b" stroke-width="0.5"/>
  <text x="340" y="293" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#374151">Bull?</text>

  <!-- Bull 분기 라벨 -->
  <text x="224" y="284" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">Yes</text>
  <!-- Bear 분기 라벨 -->
  <text x="456" y="284" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">No</text>

  <!-- Bull → left box -->
  <line x1="275" y1="288" x2="172" y2="288" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr2)"/>
  <!-- Bull box (amber) -->
  <rect x="34" y="264" width="138" height="48" rx="8" fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
  <text x="103" y="282" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#633806">강세장 Bull</text>
  <text x="103" y="300" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#854f0b">모멘텀 70%  ·  변동성 30%</text>

  <!-- Bear → right box -->
  <line x1="405" y1="288" x2="508" y2="288" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr2)"/>
  <!-- Bear box (coral) -->
  <rect x="508" y="264" width="138" height="48" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
  <text x="577" y="282" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#712b13">약세장 Bear</text>
  <text x="577" y="300" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#993c1d">모멘텀 40%  ·  변동성 60%</text>

  <!-- 합류 라인 -->
  <line x1="103" y1="312" x2="103" y2="370" stroke="#94a3b8" stroke-width="1"/>
  <line x1="103" y1="370" x2="300" y2="370" stroke="#94a3b8" stroke-width="1"/>
  <line x1="577" y1="312" x2="577" y2="370" stroke="#94a3b8" stroke-width="1"/>
  <line x1="380" y1="370" x2="577" y2="370" stroke="#94a3b8" stroke-width="1"/>
  <line x1="340" y1="318" x2="340" y2="370" stroke="#64748b" stroke-width="1"/>
  <line x1="300" y1="370" x2="380" y2="370" stroke="#94a3b8" stroke-width="1"/>
  <line x1="340" y1="370" x2="340" y2="388" stroke="#64748b" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ⑤ 팩터 계산 2개 병렬 (purple) -->
  <!-- 모멘텀 -->
  <rect x="50" y="390" width="258" height="70" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="179" y="412" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#3c3489">모멘텀 점수</text>
  <text x="179" y="430" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#534ab7">21일×10%  ·  63일×20%</text>
  <text x="179" y="447" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#534ab7">126일×30%  ·  252일×40%  →  rank</text>

  <!-- 변동성 역수 -->
  <rect x="372" y="390" width="258" height="70" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="501" y="412" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#3c3489">변동성 역수 점수</text>
  <text x="501" y="430" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#534ab7">60일 표준편차 계산</text>
  <text x="501" y="447" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#534ab7">낮은 변동성  →  높은 점수 (rank)</text>

  <!-- 병렬 합류 -->
  <line x1="179" y1="460" x2="179" y2="504" stroke="#94a3b8" stroke-width="1"/>
  <line x1="179" y1="504" x2="300" y2="504" stroke="#94a3b8" stroke-width="1"/>
  <line x1="501" y1="460" x2="501" y2="504" stroke="#94a3b8" stroke-width="1"/>
  <line x1="380" y1="504" x2="501" y2="504" stroke="#94a3b8" stroke-width="1"/>
  <line x1="300" y1="504" x2="380" y2="504" stroke="#94a3b8" stroke-width="1"/>
  <line x1="340" y1="504" x2="340" y2="522" stroke="#64748b" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ⑥ 알파 결합 (teal) -->
  <rect x="110" y="524" width="460" height="70" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="340" y="548" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#085041">알파 점수 결합 — 가산 블렌딩</text>
  <text x="340" y="566" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#0f6e56">기본 비중(시총/균등) × 40%  +  알파 점수 × 60%</text>
  <text x="340" y="582" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#0f6e56">→  정규화</text>

  <line x1="340" y1="594" x2="340" y2="622" stroke="#64748b" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ⑦ 비중 제한 (blue) -->
  <rect x="150" y="624" width="380" height="56" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
  <text x="340" y="646" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#0c447c">비중 제한 · 정규화</text>
  <text x="340" y="664" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#185fa5">단일 종목 max 25% 클리핑  →  재정규화</text>

  <line x1="340" y1="680" x2="340" y2="708" stroke="#64748b" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ⑧ 매수 집행 (amber) -->
  <rect x="110" y="710" width="460" height="70" rx="8" fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
  <text x="340" y="734" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#633806">매수 집행</text>
  <text x="340" y="752" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#854f0b">유효 종목 필터(가격 &gt; 0)  →  예산 재분배</text>
  <text x="340" y="768" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#854f0b">주간 예산 ÷ FX ÷ 현재 주가  =  매수 주수</text>

  <line x1="340" y1="780" x2="340" y2="808" stroke="#64748b" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ⑨ 기록 (gray pill) -->
  <rect x="200" y="810" width="280" height="40" rx="20" fill="#f1efea" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="835" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#444441">평가금액 기록 · 다음 주 반복</text>

  <!-- 반복 화살표 -->
  <path d="M 480 830 L 630 830 L 630 40 L 542 40" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr2)"/>
</svg>
