<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 620" width="680" height="620">
  <title>QPM Academic Momentum 전략 흐름도</title>
  <desc>자동 미국 대형주 유니버스에서 월간 종목을 선정하고 주간 투자금을 배분하는 과정</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5"/>
    </marker>
  </defs>
  <rect width="680" height="620" fill="#ffffff"/>
  <text x="340" y="38" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#111827">Academic Momentum</text>
  <text x="340" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">월간 선정 · 주간 부족 비중 배분</text>

  <g font-family="system-ui,sans-serif" text-anchor="middle">
    <rect x="130" y="88" width="420" height="62" rx="12" fill="#e1f5ee" stroke="#0f6e56"/>
    <text x="340" y="113" font-size="13" font-weight="700" fill="#085041">자동 유니버스</text>
    <text x="340" y="134" font-size="11" fill="#0f6e56">NYSE·Nasdaq 시가총액 Top 100 · 보통주·ADR</text>

    <line x1="340" y1="150" x2="340" y2="180" stroke="#64748b" marker-end="url(#arrow)"/>
    <rect x="72" y="184" width="536" height="102" rx="12" fill="#eeedfe" stroke="#534ab7"/>
    <text x="340" y="208" font-size="13" font-weight="700" fill="#3c3489">논문 기반 팩터 순위</text>
    <text x="340" y="232" font-size="11" fill="#534ab7">12-1개월 모멘텀 65%</text>
    <text x="340" y="252" font-size="11" fill="#534ab7">수익경로 지속성 20% · 낮은 잔차변동성 15%</text>
    <text x="340" y="272" font-size="10" fill="#7c75bd">최근 1개월 제외 · 각 팩터 횡단면 백분위</text>

    <line x1="340" y1="286" x2="340" y2="316" stroke="#64748b" marker-end="url(#arrow)"/>
    <rect x="130" y="320" width="420" height="66" rx="12" fill="#e6f1fb" stroke="#185fa5"/>
    <text x="340" y="346" font-size="13" font-weight="700" fill="#0c447c">월간 Top N 확정</text>
    <text x="340" y="368" font-size="11" fill="#185fa5">동일비중 1/N · 한 달 동안 구성종목 고정</text>

    <line x1="340" y1="386" x2="340" y2="416" stroke="#64748b" marker-end="url(#arrow)"/>
    <rect x="104" y="420" width="472" height="78" rx="12" fill="#faeeda" stroke="#854f0b"/>
    <text x="340" y="446" font-size="13" font-weight="700" fill="#633806">사용자 입력금액 전액 배분</text>
    <text x="340" y="468" font-size="11" fill="#854f0b">목표 평가금액 − 현재 평가금액 = 부족금액</text>
    <text x="340" y="487" font-size="10" fill="#9a6700">부족금액 비율로 주간 투자금 분배</text>

    <line x1="340" y1="498" x2="340" y2="528" stroke="#64748b" marker-end="url(#arrow)"/>
    <rect x="160" y="532" width="360" height="58" rx="29" fill="#f1efea" stroke="#888780"/>
    <text x="340" y="557" font-size="12" font-weight="700" fill="#444441">월간 ±3% 허용밴드 리밸런싱</text>
    <text x="340" y="577" font-size="10" fill="#666660">과열·API 위험은 표시 및 전향 기록</text>
  </g>
</svg>
